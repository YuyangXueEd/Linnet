title: "MyDailyUpdater"
description: "Daily AI/CV/Medical Imaging research updates — auto-generated at UK midnight"
remote_theme: just-the-docs/just-the-docs@v0.10.0
url: "https://yuyangxueed.github.io"
baseurl: "/MyDailyUpdater"

# just-the-docs settings
color_scheme: dark
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

nav_sort: desc

footer_content: "Auto-generated by <a href='https://github.com/YuyangXueEd/MyDailyUpdater'>MyDailyUpdater</a>"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - data/
  - "*.py"
  - requirements.txt
  - "*.yaml"
  - "*.yml"
  - "!_config.yml"
  - "!*.md"

# AI infrastructure stock universe and deterministic pre-market scoring defaults.
# API keys are optional and should live in environment variables or GitHub Actions secrets.

news_window_hours: 18
max_news_per_symbol: 3
history_days: 90
max_sector_overview: 8

data_providers:
  quotes:
    # Yahoo is the primary public baseline; Nasdaq is the no-key delayed fallback.
    # If FINNHUB_API_KEY is available, users can change this to [finnhub, yahoo, nasdaq].
    order: [yahoo, nasdaq]
  news:
    # GDELT is broad and free; Google News RSS is the no-key fallback when GDELT is sparse.
    # If FINNHUB_API_KEY is available, users can change this to [finnhub, gdelt, google_news_rss].
    order: [gdelt, google_news_rss]
  filings:
    # SEC API needs a User-Agent; the SEC company page remains as a no-key reference link.
    order: [sec, sec_company_page]

api_key_env:
  finnhub: FINNHUB_API_KEY

signal_thresholds:
  bullish: 70
  bearish: 35
  high_confidence: 75

scoring_weights:
  premarket_move: 0.18
  news: 0.25
  earnings_financials: 0.12
  technicals: 0.22
  sector_trend: 0.18
  risk_flags: 0.05

analysis_modules:
  market_regime: true
  sector_overview: true
  sector_trend: true
  news: true
  technicals: true
  filings: true


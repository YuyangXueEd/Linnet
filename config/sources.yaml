arxiv:
  enabled: true
  max_papers_per_run: 500

hacker_news:
  enabled: true

jobs:
  enabled: true

supervisor_monitoring:
  enabled: true

github_trending:
  enabled: true
  max_repos: 15

llm:
  # Fast cheap model for scoring (just needs to output 0-10)
